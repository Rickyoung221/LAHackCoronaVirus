<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <style>
      /* Always set the map height explicitly to define the size of the div
       * element that contains the map. */
      #map {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
      }
      /* Optional: Makes the sample page fill the window. */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      #floating-panel1 {
        position: absolute;
        top: 10px;
        left: 16%;
        z-index: 5;
        background-color: #fff;
        padding: 5px;
        border: 1px solid #999;
        text-align: center;
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
      }
        #floating-panel2 {
        position: absolute;
        top: 10px;
        left: 32%;
        z-index: 5;
        background-color: #fff;
        padding: 5px;
        border: 1px solid #999;
        text-align: center;
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
      }

        #data {
            position: absolute;
            top: 50%;
            left: 0%;
            z-index: 5;
            background-color: #fff;
            width: 300px;
            height:200px;
            border: 10px solid #B22222;
            padding: 50px;
            margin: 10px;

        text-align: center;
        font-family: 'Roboto','sans-serif';
        line-height: 30px;
        padding-left: 10px;
            display: block;
            overflow: auto;
         box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            display:none;
        }

        #covid-data-banner {
            flex-shrink: 0;
            position: relative;
            z-index: 6;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            line-height: 1.45;
            padding: 10px 14px;
            margin: 0;
            background: #f4f7fb;
            border-top: 1px solid #c5d4e0;
            color: #1a1a1a;
            max-height: 38vh;
            overflow: auto;
            box-sizing: border-box;
        }
        #covid-data-banner strong { color: #0d47a1; }

    </style>

  </head>

  <body>
    <div id="data">
    <h1>City: </h1>
        <p>The number of people who is Coronavirus-19 tested positive in this area:</p>
    </div>

    <div id="floating-panel1">
      <input id="address" type="textbox" value="Los Angeles, CA">
      <input id="submit" type="button" value="Enter">
    </div>

     <div id="floating-panel2">
      <input id="btn-clear-markers" type="button" value="Hide Markers">
      <input id="btn-show-markers" type="button" value="Show All Markers">
      <input id="btn-delete-markers" type="button" value="Delete Markers">
    </div>
    <div id="map"></div>
    <div id="covid-data-banner" role="status">Loading data notes and <code>coronavirus.csv</code>…</div>
  <script src="js/covid-data-note.js"></script>
  <script src="js/index-app.js"></script>
    <script async
    src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&callback=initMap&loading=async&v=weekly">
    </script>
  </body>
</html>
