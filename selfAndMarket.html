<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Places Search Box</title>
    <link rel="stylesheet" type="text/css" href="./Semantic-UI-CSS-master/semantic.css">
    <style>
      #map {
        height: 100%;
      }
      html, body {
        height: 100%;
      }
      
    </style>
  </head>
  <body>

    <div style="height: 100%;" class="ui inverted vertical masthead center aligned segment">
      <div class="ui text container">
        <h1 class="ui inverted header">
          LA Markets Near You
        </h1>
        <h2>Retail food markets and driving distance from your address</h2>
        <a class="ui huge primary button" style="color: #fff;" href="#map">Get Started</a>
      </div>
    </div>

    <div class="ui search">
      <div class="ui icon input center aligned">
        <input class="prompt" id="pac-input" type="text" placeholder="Add address...">
        <i class="search icon"></i>
      </div>
      <div class="results"></div>
    </div>

    <!-- <input id="pac-input" type="text" placeholder="Search Box"> -->
    <div id="output"></div>
    <div id="map"></div>

    <script src="lacity-location.js"></script>
    <script>
      async function initAutocomplete() {
        var markerLib = await google.maps.importLibrary('marker');
        var AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
        var PinElement = markerLib.PinElement;
        // initialize map on LA
        var map = new google.maps.Map(document.getElementById('map'), {
          center: {lat: 34.0522, lng: -118.2437},
          zoom: 11,
          mapTypeId: 'roadmap',
          mapId: 'DEMO_MAP_ID',
        });
        // Create the search box and link it to the UI element.
        var input = document.getElementById('pac-input');
        var searchBox = new google.maps.places.SearchBox(input);
        // map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

        // Bias the SearchBox results towards current map's viewport.
        map.addListener('bounds_changed', function() {
          searchBox.setBounds(map.getBounds());
        });
        

        var infoWindow = new google.maps.InfoWindow;
        var rows;
        // Change this depending on the name of your PHP or XML file
        downloadUrl('https://data.lacity.org/api/views/g986-7yf9/rows.xml?accessType=DOWNLOAD', function(data) {
            var xml = lacityParseSocrataXmlFromXhr(data);
            if (!xml) return;
            rows = xml.getElementsByTagName("row");
            var count = 0;
            Array.prototype.forEach.call(rows, function(row) {
                if (lacityIsLeafMarketRow(row) && count < 400) {
                    if (row.getElementsByTagName("dba_name")[0] === undefined)
                        var name = row.getElementsByTagName("business_name")[0].childNodes[0].data; 
                    else
                        var name = row.getElementsByTagName("dba_name")[0].childNodes[0].data; 
                    var street = row.getElementsByTagName("street_address")[0].childNodes[0].data;
                    var loc = lacityParseLocation1(row.getElementsByTagName("location_1")[0]);
                    if (!loc) return;
                    var point = new google.maps.LatLng(loc.lat, loc.lng);

                    var infowincontent = document.createElement('div');
                    var strong = document.createElement('strong');
                    strong.textContent = name
                    infowincontent.appendChild(strong);
                    infowincontent.appendChild(document.createElement('br'));
                    var text = document.createElement('text');
                    text.textContent = street;
                    infowincontent.appendChild(text);
                    var pin = new PinElement({
                      background: '#1a73e8',
                      borderColor: '#174ea6',
                      glyph: 'M',
                      glyphColor: 'white',
                    });
                    var markets = new AdvancedMarkerElement({
                        map: map,
                        position: point,
                        content: pin.element,
                    });
                    markets.addListener('gmp-click', function() {
                        infoWindow.setContent(infowincontent);
                        infoWindow.open(map, markets);
                    });
                    count++;
                }   
            });
        });

        var markers = [];
        // Listen for the event fired when the user selects a prediction and retrieve
        // more details for that place.
        searchBox.addListener('places_changed', function() {
          var places = searchBox.getPlaces();
          if (places.length == 0)
            return;
          // Clear out the old markers.
          markers.forEach(function(marker) {
            marker.map = null;
          });
          markers = [];
          // For each place, get the icon, name and location.
          var bounds = new google.maps.LatLngBounds();
          if (!places[0].geometry) {
            return;
          }
          var placeIcon = document.createElement('img');
          placeIcon.src = places[0].icon;
          placeIcon.width = 25;
          placeIcon.height = 25;
          placeIcon.alt = '';
          markers.push(new AdvancedMarkerElement({
            map: map,
            content: placeIcon,
            title: places[0].name,
            position: places[0].geometry.location
          }));
          if (places[0].geometry.viewport) {
            // Only geocodes have viewport.
            bounds.union(places[0].geometry.viewport);
          } else {
            bounds.extend(places[0].geometry.location);
          }
          map.fitBounds(bounds);
       
          /**
           * calculate travel distance
           */
          var origin = places[0].geometry.location.toJSON() 
          var destinations = [{lat: 34.0451, lng: -118.3533}, {lat: 34.0621, lng: -118.271}, {lat: 34.0045, lng: -118.4302}]
          var destinations = []
          count = 0;
          Array.prototype.forEach.call(rows, function(row) {
            if (count >= 25) return;
            var loc = lacityParseLocation1(row.getElementsByTagName("location_1")[0]);
            if (!loc) return;
            destinations.push({ lat: loc.lat, lng: loc.lng });
            count++;
          });
          var service = new google.maps.DistanceMatrixService;
          service.getDistanceMatrix({
            origins: [origin],
            destinations: destinations,
            travelMode: 'DRIVING',
            unitSystem: google.maps.UnitSystem.METRIC,
            avoidHighways: false,
            avoidTolls: false
          }, function(response, status) {
            if (status !== 'OK') {
              alert('Error was: ' + status);
            } else {
              var originList = response.originAddresses;
              var destinationList = response.destinationAddresses;
              var outputDiv = document.getElementById('output');
              outputDiv.innerHTML = '';
              for (var i = 0; i < originList.length; i++) {
                var results = response.rows[i].elements;
                var dis_sorted = []
                for (var j=0; j<results.length; j++) {
                    if (results[j].distance !== undefined)
                        dis_sorted.push({value: results[j].distance.value, index: j});
                }
                dis_sorted.sort((a, b) => {
                    return a.value - b.value;
                });
                for (var j = 0; j < results.length; j++) {
                  outputDiv.innerHTML += originList[i]+' to '+destinationList[j]+': '+ results[dis_sorted[j].index].distance.text+' in '+results[j].duration.text+'<br>';
                }
              }
            }
          });
        });
        
        
      }

      function downloadUrl(url, callback) {
        var request = window.ActiveXObject ? new ActiveXObject('Microsoft.XMLHTTP') : new XMLHttpRequest;
        request.onreadystatechange = function() {
          if (request.readyState == 4) {
            request.onreadystatechange = doNothing;
            callback(request, request.status);
          }
        };
        request.open('GET', url, true);
        request.send(null);
      }

      function doNothing() {}

    </script>
    <script async
      src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&libraries=places&callback=initAutocomplete&loading=async&v=weekly"></script>
  </body>
</html>
