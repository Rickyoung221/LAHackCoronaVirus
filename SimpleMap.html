<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Using MySQL and PHP with Google Maps</title>
    <style>
        /* Always set the map height explicitly to define the size of the div
         * element that contains the map. */
        #map {
            height: 100%;
        }
        /* Optional: Makes the sample page fill the window. */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script src="lacity-location.js"></script>
<script>
    async function initMap() {
        var markerLib = await google.maps.importLibrary('marker');
        var AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
        var PinElement = markerLib.PinElement;
        var map = new google.maps.Map(document.getElementById('map'), {
            center: new google.maps.LatLng(34.052235, -118.243683),
            zoom: 10,
            mapId: 'DEMO_MAP_ID',
        });
        var infoWindow = new google.maps.InfoWindow;

        // Change this depending on the name of your PHP or XML file
        downloadUrl('https://data.lacity.org/api/views/g986-7yf9/rows.xml?accessType=DOWNLOAD', function (data) {
            var xml = lacityParseSocrataXmlFromXhr(data);
            if (!xml) return;
            var rows = xml.documentElement.getElementsByTagName('row');
            Array.prototype.forEach.call(rows, function (markerElem) {
                    if (!lacityIsLeafMarketRow(markerElem)) return;
                    var name = markerElem.getElementsByTagName("dba_name")[0].childNodes[0].data;
                    var address = markerElem.getElementsByTagName("street_address")[0].childNodes[0].data;
                    var loc = lacityParseLocation1(markerElem.getElementsByTagName("location_1")[0]);
                    if (!loc) return;
                    var point = new google.maps.LatLng(loc.lat, loc.lng);

                    var infowincontent = document.createElement('div');
                    var strong = document.createElement('strong');
                    strong.textContent = name
                    infowincontent.appendChild(strong);
                    infowincontent.appendChild(document.createElement('br'));

                    var text = document.createElement('text');
                    text.textContent = address
                    infowincontent.appendChild(text);
                    //var icon = customLabel[type] || {};
                    var pin = new PinElement({
                      background: '#1a73e8',
                      borderColor: '#174ea6',
                      glyph: 'M',
                      glyphColor: 'white',
                    });
                    var marker = new AdvancedMarkerElement({
                        map: map,
                        position: point,
                        content: pin.element,
                    });
                    marker.addListener('gmp-click', function () {
                        infoWindow.setContent(infowincontent);
                        infoWindow.open(map, marker);
                    });
            });
        });
    }


    function downloadUrl(url, callback) {
        var request = window.ActiveXObject ?
            new ActiveXObject('Microsoft.XMLHTTP') :
            new XMLHttpRequest;

        request.onreadystatechange = function() {
            if (request.readyState == 4) {
                request.onreadystatechange = doNothing;
                callback(request, request.status);
            }
        };

        request.open('GET', url, true);
        request.send(null);
    }

    function doNothing() {}
</script>
<script async
        src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&callback=initMap&loading=async&v=weekly">
</script>
</body>
</html>
